<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff4001">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>OPUS</title>
<style>
  /* ═══════════════════════════════════════
     RESET & BASE
  ═══════════════════════════════════════ */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  :root {
    --primary: #ff4001;
    --primary-light: #ffe5d3;
    --primary-dark: #cc3300;
    --bg: #ffffff;
    --bg-secondary: #f8f8f8;
    --bg-tertiary: #f0f0f0;
    --text-primary: #1a1a1a;
    --text-secondary: #666666;
    --text-muted: #999999;
    --border: #ebebeb;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-full: 9999px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-spring: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html {
    height: -webkit-fill-available;
    overflow: hidden;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    height: -webkit-fill-available;
    overflow: hidden;
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
  }

  /* ═══════════════════════════════════════
     APP SHELL
  ═══════════════════════════════════════ */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    overflow: hidden;
    position: relative;
  }

  /* ═══════════════════════════════════════
     SCREENS
  ═══════════════════════════════════════ */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    transition: transform var(--transition-normal), opacity var(--transition-normal);
    will-change: transform, opacity;
    overflow: hidden;
  }

  .screen.hidden {
    display: none;
    pointer-events: none;
  }

  .screen.slide-in-right {
    transform: translateX(100%);
  }

  .screen.slide-in-right.active {
    transform: translateX(0);
  }

  /* ═══════════════════════════════════════
     AUTH SCREEN
  ═══════════════════════════════════════ */
  #auth-screen {
    justify-content: center;
    align-items: center;
    padding: 24px;
    background: var(--bg);
    overflow-y: auto;
  }

  .auth-container {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .auth-logo {
    text-align: center;
  }

  .auth-logo h1 {
    font-size: 42px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -2px;
    line-height: 1;
  }

  .auth-logo p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 400;
  }

  .auth-tabs {
    display: flex;
    background: var(--bg-tertiary);
    border-radius: var(--radius-full);
    padding: 4px;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: var(--radius-full);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
    font-family: var(--font);
  }

  .auth-tab.active {
    background: var(--bg);
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .auth-form.hidden {
    display: none;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-field {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-family: var(--font);
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    transition: border-color var(--transition-fast);
    -webkit-appearance: none;
  }

  .input-field:focus {
    border-color: var(--primary);
  }

  .input-field::placeholder {
    color: var(--text-muted);
  }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-full);
    font-size: 15px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    transition: all var(--transition-fast);
    min-height: 52px;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary:active {
    transform: scale(0.98);
    background: var(--primary-dark);
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-primary.loading::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .auth-error {
    padding: 12px 16px;
    background: #fff0ee;
    border: 1px solid #ffd0c7;
    border-radius: var(--radius-md);
    color: var(--primary);
    font-size: 13px;
    font-weight: 500;
    display: none;
  }

  .auth-error.show {
    display: block;
  }

  /* ═══════════════════════════════════════
     MAIN SCREEN (CHAT LIST)
  ═══════════════════════════════════════ */
  #main-screen {
    display: flex;
    flex-direction: column;
  }

  /* ═══════════════════════════════════════
     HEADER
  ═══════════════════════════════════════ */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    padding-top: calc(var(--safe-top) + 12px);
    padding-bottom: 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
  }

  .header-logo {
    font-size: 24px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
    cursor: pointer;
  }

  .header-username {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 8px 12px;
    border-radius: var(--radius-full);
    transition: background var(--transition-fast);
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .header-username:active {
    background: var(--bg-tertiary);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: background var(--transition-fast);
    position: relative;
    color: var(--text-primary);
  }

  .icon-btn:active {
    background: var(--bg-tertiary);
  }

  .icon-btn svg {
    width: 22px;
    height: 22px;
  }

  .notification-dot {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    border: 2px solid var(--bg);
    display: none;
  }

  .notification-dot.show {
    display: block;
  }

  /* ═══════════════════════════════════════
     TABS
  ═══════════════════════════════════════ */
  .main-tabs {
    display: flex;
    padding: 0 16px;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .main-tab {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all var(--transition-fast);
    position: relative;
  }

  .main-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  .tab-badge {
    position: absolute;
    top: 10px;
    right: calc(50% - 24px);
    width: 16px;
    height: 16px;
    background: var(--primary);
    color: white;
    font-size: 9px;
    font-weight: 700;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .tab-badge.show {
    display: flex;
  }

  /* ═══════════════════════════════════════
     TAB CONTENT
  ═══════════════════════════════════════ */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  .tab-panel {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .tab-panel.active {
    display: flex;
  }

  /* ═══════════════════════════════════════
     CHAT LIST
  ═══════════════════════════════════════ */
  .chat-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .chat-list-item {
    display: flex;
    align-items: center;
    padding: 16px;
    gap: 12px;
    cursor: pointer;
    transition: background var(--transition-fast);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .chat-list-item:active {
    background: var(--bg-secondary);
  }

  .chat-item-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }

  .chat-item-info {
    flex: 1;
    min-width: 0;
  }

  .chat-item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-item-last {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .chat-item-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .chat-item-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .unread-badge {
    width: 20px;
    height: 20px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ═══════════════════════════════════════
     REQUESTS LIST
  ═══════════════════════════════════════ */
  .requests-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 0;
  }

  .request-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .request-item-avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }

  .request-item-info {
    flex: 1;
    min-width: 0;
  }

  .request-item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .request-item-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .request-actions {
    display: flex;
    gap: 8px;
  }

  .btn-accept, .btn-reject {
    padding: 8px 16px;
    border-radius: var(--radius-full);
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    min-height: 36px;
    transition: all var(--transition-fast);
  }

  .btn-accept {
    background: var(--primary);
    color: white;
  }

  .btn-accept:active {
    background: var(--primary-dark);
  }

  .btn-reject {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
  }

  .btn-reject:active {
    background: var(--border);
  }

  /* ═══════════════════════════════════════
     EMPTY STATE
  ═══════════════════════════════════════ */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 12px;
  }

  .empty-state-icon {
    width: 64px;
    height: 64px;
    background: var(--primary-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state-icon svg {
    width: 30px;
    height: 30px;
    color: var(--primary);
  }

  .empty-state h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .empty-state p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ═══════════════════════════════════════
     CHAT SCREEN
  ═══════════════════════════════════════ */
  #chat-screen {
    display: flex;
    flex-direction: column;
    z-index: 20;
  }

  .chat-header {
    display: flex;
    align-items: center;
    padding: 0 8px;
    padding-top: calc(var(--safe-top) + 8px);
    padding-bottom: 8px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    gap: 4px;
    flex-shrink: 0;
    min-height: 60px;
  }

  .chat-header-back {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: var(--radius-full);
    transition: background var(--transition-fast);
    flex-shrink: 0;
  }

  .chat-header-back:active {
    background: var(--bg-tertiary);
  }

  .chat-header-info {
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }

  .chat-header-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-header-status {
    font-size: 12px;
    color: var(--text-muted);
    min-height: 16px;
    transition: opacity var(--transition-fast);
  }

  .chat-header-status.typing {
    color: var(--primary);
  }

  /* ═══════════════════════════════════════
     MESSAGES AREA
  ═══════════════════════════════════════ */
  .messages-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }

  .messages-inner {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0 8px;
    min-height: 100%;
    justify-content: flex-end;
  }

  /* ═══════════════════════════════════════
     MESSAGE BUBBLE
  ═══════════════════════════════════════ */
  .message-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: msgSlideIn var(--transition-normal) ease-out;
    will-change: transform, opacity;
  }

  @keyframes msgSlideIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .message-wrapper.sent {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message-wrapper.received {
    align-self: flex-start;
    align-items: flex-start;
  }

  .message-wrapper.selected .message-bubble {
    opacity: 0.6;
    outline: 2px solid var(--primary);
  }

  .message-group-spacer {
    height: 8px;
  }

  .message-bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.4;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity var(--transition-fast);
    max-width: 100%;
  }

  .message-wrapper.sent .message-bubble {
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message-wrapper.received .message-bubble {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
  }

  .message-wrapper.sent .message-bubble.consecutive {
    border-top-right-radius: 4px;
  }

  .message-wrapper.received .message-bubble.consecutive {
    border-top-left-radius: 4px;
  }

  .message-deleted {
    font-style: italic;
    opacity: 0.5;
    font-size: 13px !important;
  }

  .message-edited-label {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 2px;
    padding: 0 2px;
  }

  .message-meta {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 3px;
    padding: 0 2px;
  }

  .message-time {
    font-size: 10px;
    color: var(--text-muted);
  }

  .message-status {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
  }

  .message-status.seen {
    color: var(--primary);
  }

  /* Reply preview in bubble */
  .reply-preview-bubble {
    background: rgba(0,0,0,0.08);
    border-left: 3px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 12px;
    opacity: 0.85;
  }

  .message-wrapper.received .reply-preview-bubble {
    background: rgba(0,0,0,0.06);
    border-left-color: var(--primary);
  }

  .reply-preview-bubble .reply-sender {
    font-weight: 700;
    margin-bottom: 2px;
    font-size: 11px;
  }

  .reply-preview-bubble .reply-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }

  /* Reactions */
  .message-reactions {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .reaction-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-full);
    padding: 2px 8px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
  }

  .reaction-count {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* Swipe reply indicator */
  .message-wrapper.swiping .message-bubble {
    transition: transform var(--transition-fast);
  }

  /* Date divider */
  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 8px;
  }

  .date-divider::before,
  .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .date-divider span {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════
     REPLY INDICATOR
  ═══════════════════════════════════════ */
  .reply-indicator {
    display: none;
    align-items: center;
    padding: 8px 16px;
    background: var(--primary-light);
    border-top: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
  }

  .reply-indicator.show {
    display: flex;
    animation: slideUp 150ms ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .reply-indicator-content {
    flex: 1;
    min-width: 0;
  }

  .reply-indicator-sender {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
  }

  .reply-indicator-text {
    font-size: 13px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .reply-indicator-close {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: var(--text-muted);
    font-size: 18px;
  }

  /* ═══════════════════════════════════════
     INPUT BAR
  ═══════════════════════════════════════ */
  .chat-input-bar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  .input-wrapper {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--bg-secondary);
    border-radius: 22px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: border-color var(--transition-fast);
    min-height: 44px;
  }

  .input-wrapper:focus-within {
    border-color: var(--primary);
  }

  .emoji-btn {
    width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    color: var(--text-muted);
    transition: color var(--transition-fast);
  }

  .emoji-btn:active {
    color: var(--primary);
  }

  #message-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 15px;
    font-family: var(--font);
    color: var(--text-primary);
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 44px;
    line-height: 1.4;
    padding: 12px 0 12px 4px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #message-input::placeholder {
    color: var(--text-muted);
  }

  .send-btn {
    width: 44px;
    height: 44px;
    background: var(--primary);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
    flex-shrink: 0;
  }

  .send-btn:active {
    transform: scale(0.92);
    background: var(--primary-dark);
  }

  .send-btn svg {
    width: 20px;
    height: 20px;
    color: white;
  }

  /* ═══════════════════════════════════════
     EMOJI PICKER
  ═══════════════════════════════════════ */
  .emoji-picker {
    position: absolute;
    bottom: 100%;
    left: 12px;
    right: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 16px;
    display: none;
    z-index: 100;
    animation: fadeInUp 200ms ease-out;
  }

  .emoji-picker.show {
    display: block;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }

  .emoji-btn-item {
    font-size: 24px;
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-sm);
    text-align: center;
    transition: background var(--transition-fast);
    user-select: none;
    border: none;
    background: transparent;
  }

  .emoji-btn-item:active {
    background: var(--bg-tertiary);
  }

  /* ═══════════════════════════════════════
     CONTEXT BOTTOM SHEET
  ═══════════════════════════════════════ */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    animation: fadeIn 200ms ease;
  }

  .overlay.show {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 0;
    z-index: 300;
    display: none;
    flex-direction: column;
    max-height: 85vh;
    box-shadow: var(--shadow-lg);
    transform: translateY(100%);
    transition: transform var(--transition-normal);
    padding-bottom: var(--safe-bottom);
  }

  .bottom-sheet.show {
    display: flex;
    transform: translateY(0);
  }

  .bottom-sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: var(--radius-full);
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  .bottom-sheet-title {
    padding: 16px 20px 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .bottom-sheet-actions {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .sheet-action {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    cursor: pointer;
    transition: background var(--transition-fast);
    border: none;
    background: transparent;
    text-align: left;
    font-family: var(--font);
  }

  .sheet-action:active {
    background: var(--bg-secondary);
  }

  .sheet-action-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sheet-action-icon svg {
    width: 18px;
    height: 18px;
    color: var(--text-secondary);
  }

  .sheet-action.danger .sheet-action-icon {
    background: #fff0ee;
  }

  .sheet-action.danger .sheet-action-icon svg {
    color: var(--primary);
  }

  .sheet-action-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .sheet-action.danger .sheet-action-label {
    color: var(--primary);
  }

  .sheet-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Reaction picker in sheet */
  .reaction-picker-row {
    display: flex;
    justify-content: space-around;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .reaction-emoji-btn {
    font-size: 28px;
    cursor: pointer;
    padding: 8px;
    border-radius: var(--radius-sm);
    transition: transform var(--transition-spring);
    border: none;
    background: transparent;
  }

  .reaction-emoji-btn:active {
    transform: scale(1.3);
  }

  /* ═══════════════════════════════════════
     EDIT MESSAGE INLINE
  ═══════════════════════════════════════ */
  .message-edit-input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 15px;
    font-family: var(--font);
    color: inherit;
    outline: none;
    resize: none;
    line-height: 1.4;
    padding: 0;
  }

  .message-edit-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    justify-content: flex-end;
  }

  .edit-save-btn, .edit-cancel-btn {
    padding: 6px 14px;
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    min-height: 32px;
    transition: all var(--transition-fast);
  }

  .edit-save-btn {
    background: var(--primary);
    color: white;
  }

  .edit-cancel-btn {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
  }

  /* ═══════════════════════════════════════
     MODALS
  ═══════════════════════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: fadeIn 200ms ease;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--bg);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 400px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 0;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border: none;
    background: var(--bg-tertiary);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-secondary);
    transition: background var(--transition-fast);
  }

  .modal-close:active {
    background: var(--border);
  }

  .modal-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ═══════════════════════════════════════
     ADD USER MODAL
  ═══════════════════════════════════════ */
  .search-result-item {
    display: flex;
    align-items: center;
    padding: 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    gap: 12px;
  }

  .search-result-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
  }

  .search-result-info {
    flex: 1;
    min-width: 0;
  }

  .search-result-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .search-result-id {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .btn-send-request {
    padding: 8px 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-full);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    min-height: 36px;
    white-space: nowrap;
    transition: all var(--transition-fast);
  }

  .btn-send-request:active {
    background: var(--primary-dark);
  }

  .btn-send-request:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ═══════════════════════════════════════
     SETTINGS MODAL
  ═══════════════════════════════════════ */
  .settings-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .settings-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .settings-user-id {
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--text-secondary);
    word-break: break-all;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  .settings-user-id span {
    font-weight: 600;
    color: var(--primary);
    font-size: 12px;
  }

  .settings-divider {
    height: 1px;
    background: var(--border);
  }

  .danger-btn {
    width: 100%;
    padding: 14px;
    border: 2px solid #ff4001;
    border-radius: var(--radius-full);
    background: transparent;
    color: var(--primary);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition-fast);
    min-height: 48px;
  }

  .danger-btn:active {
    background: #fff0ee;
  }

  /* ═══════════════════════════════════════
     TOAST NOTIFICATION
  ═══════════════════════════════════════ */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    color: white;
    padding: 10px 20px;
    border-radius: var(--radius-full);
    font-size: 13px;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    transition: all var(--transition-normal);
    white-space: nowrap;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ═══════════════════════════════════════
     MULTI-SELECT HEADER
  ═══════════════════════════════════════ */
  .select-header {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    padding-top: calc(var(--safe-top) + 8px);
    background: var(--primary);
    gap: 12px;
    flex-shrink: 0;
    min-height: 60px;
  }

  .select-header.show {
    display: flex;
  }

  .select-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }

  .select-count {
    font-size: 16px;
    font-weight: 600;
    color: white;
  }

  .select-cancel-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    color: white;
    font-size: 22px;
    border: none;
    background: transparent;
    transition: background var(--transition-fast);
  }

  .select-cancel-btn:active {
    background: rgba(255,255,255,0.2);
  }

  .select-delete-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    color: white;
    border: none;
    background: transparent;
    transition: background var(--transition-fast);
  }

  .select-delete-btn:active {
    background: rgba(255,255,255,0.2);
  }

  .select-delete-btn svg {
    width: 22px;
    height: 22px;
  }

  /* ═══════════════════════════════════════
     LOADING INDICATOR
  ═══════════════════════════════════════ */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.hidden {
    display: none;
  }

  .loading-logo {
    font-size: 48px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -2px;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--primary-light);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ═══════════════════════════════════════
     SCROLLBAR STYLES
  ═══════════════════════════════════════ */
  ::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  /* ═══════════════════════════════════════
     TYPING INDICATOR DOTS
  ═══════════════════════════════════════ */
  .typing-dots {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    padding: 10px 14px;
    background: var(--bg-tertiary);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    margin-left: 8px;
    animation: msgSlideIn var(--transition-normal) ease-out;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ═══════════════════════════════════════
     UTILITY
  ═══════════════════════════════════════ */
  .hidden { display: none !important; }

  .flex-center {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ═══════════════════════════════════════
     RESPONSIVE ADJUSTMENTS
  ═══════════════════════════════════════ */
  @media (min-width: 768px) {
    #app {
      max-width: 480px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    body {
      background: var(--bg-secondary);
    }
  }

  /* Keyboard open class */
  body.keyboard-open .chat-input-bar {
    padding-bottom: 10px;
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">OPUS</div>
  <div class="loading-spinner"></div>
</div>

<!-- App Shell -->
<div id="app">

  <!-- ═══════════ AUTH SCREEN ═══════════ -->
  <div class="screen" id="auth-screen">
    <div class="auth-container">
      <div class="auth-logo">
        <h1>OPUS</h1>
        <p>Premium minimal chat</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="auth-error" id="login-error"></div>
        <div class="input-group">
          <label>Username</label>
          <input class="input-field" type="text" id="login-username" placeholder="Your username" autocomplete="username" autocapitalize="none">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input class="input-field" type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signup-form" onsubmit="handleSignup(event)">
        <div class="auth-error" id="signup-error"></div>
        <div class="input-group">
          <label>Username (min 8 chars)</label>
          <input class="input-field" type="text" id="signup-username" placeholder="Choose a username" autocomplete="username" autocapitalize="none" minlength="8">
        </div>
        <div class="input-group">
          <label>Password (min 8 chars)</label>
          <input class="input-field" type="password" id="signup-password" placeholder="Choose a password" autocomplete="new-password" minlength="8">
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">Create Account</button>
      </form>
    </div>
  </div>

  <!-- ═══════════ MAIN SCREEN ═══════════ -->
  <div class="screen hidden" id="main-screen">

    <!-- Header -->
    <div class="app-header">
      <span class="header-logo">OPUS</span>
      <button class="header-username" id="header-username-btn" onclick="openSettings()">...</button>
      <div class="header-actions">
        <button class="icon-btn" id="requests-btn" onclick="switchTab('requests')" title="Requests">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <div class="notification-dot" id="requests-dot"></div>
        </button>
        <button class="icon-btn" onclick="openAddUser()" title="Add User">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="main-tabs">
      <button class="main-tab active" id="tab-chats-btn" onclick="switchTab('chats')">
        Chats
      </button>
      <button class="main-tab" id="tab-requests-btn" onclick="switchTab('requests')">
        Requests
        <span class="tab-badge" id="requests-badge">0</span>
      </button>
    </div>

    <!-- Tab Content -->
    <div class="tab-content">

      <!-- Chats Panel -->
      <div class="tab-panel active" id="panel-chats">
        <div class="chat-list" id="chat-list">
          <div class="empty-state" id="chats-empty">
            <div class="empty-state-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <h3>No conversations yet</h3>
            <p>Add friends to start chatting</p>
          </div>
        </div>
      </div>

      <!-- Requests Panel -->
      <div class="tab-panel" id="panel-requests">
        <div class="requests-list" id="requests-list">
          <div class="empty-state" id="requests-empty">
            <div class="empty-state-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
              </svg>
            </div>
            <h3>No requests</h3>
            <p>Friend requests will appear here</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════ CHAT SCREEN ═══════════ -->
  <div class="screen hidden" id="chat-screen">

    <!-- Multi-select Header -->
    <div class="select-header" id="select-header">
      <div class="select-header-left">

/* ═══════════════════════════════════════════════════════

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function getChatId(uid1, uid2) {
  return [uid1, uid2].sort().join('_');
}

function getInitial(name) {
  return (name || '?').charAt(0).toUpperCase();
}

function cleanupListeners() {
  state.messageListeners.forEach(off => off());

}

function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('signup-error').classList.remove('show');
}

async function handleSignup(e) {
  e.preventDefault();
  const username = document.getElementById('signup-username').value.trim();
  const password = document.getElementById('signup-password').value;
  const errEl = document.getElementById('signup-error');
  const btn = document.getElementById('signup-btn');

  errEl.classList.remove('show');

  if (username.length < 8) {
    errEl.textContent = 'Username must be at least 8 characters.';
    errEl.classList.add('show');
    return;
  }
  if (password.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '';

  try {
    // Check username uniqueness
    const usernameSnap = await db.ref(`usernames/${username.toLowerCase()}`).get();
    if (usernameSnap.exists()) {
      throw new Error('Username already taken. Choose another.');
    }

    // Create fake email from username
    const fakeEmail = `${username.toLowerCase()}@opus.chat`;
    const cred = await auth.createUserWithEmailAndPassword(fakeEmail, password);
    const uid = cred.user.uid;

    // Save user data
    await db.ref(`users/${uid}`).set({
      username: username,
      usernameLower: username.toLowerCase(),
      uid: uid,
      createdAt: firebase.database.ServerValue.TIMESTAMP
    });
    await db.ref(`usernames/${username.toLowerCase()}`).set(uid);

  } catch (err) {
    errEl.textContent = err.message || 'Signup failed. Try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'Create Account';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  errEl.classList.remove('show');

  if (!username || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('show');
    return;

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '';

  try {
    const fakeEmail = `${username.toLowerCase()}@opus.chat`;
    await auth.signInWithEmailAndPassword(fakeEmail, password);
  } catch (err) {
    let msg = 'Invalid username or password.';
    errEl.textContent = msg;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'Sign In';
  }
}

/* ═══════════════════════════════════════════════════════
   MAIN SCREEN SETUP

function setupMainScreen() {

   TAB SWITCHING

function switchTab(tab) {
