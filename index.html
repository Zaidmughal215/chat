<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --accent-purple: #7C3AED;
            --bg-white: #FFFFFF;
            --bg-muted: #F7F6FA;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border-light: #E5E7EB;
            --input-border: #EDE8FF;
            --input-focus-shadow: rgba(124,58,237,0.18);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-white);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Mobile Carousel for Suggestions */
        @media (max-width: 768px) {
            .suggestion-grid {
                display: flex !important;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 1rem;
                padding-bottom: 1rem;
                padding-right: 1rem;
                margin-left: -1rem; 
                padding-left: 1rem; 
                width: calc(100% + 2rem);
            }
            .suggestion-card {
                min-width: 85vw;
                scroll-snap-align: center;
                flex-shrink: 0;
            }
        }

        /* Markdown Styles */
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body pre { background: #111827; color: #fff; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin-bottom: 0.75em; }
        .markdown-body code { font-family: monospace; background: #F3F4F6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; color: #DC2626; }
        .markdown-body pre code { background: transparent; padding: 0; color: #e5e7eb; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75em; }
        .markdown-body strong { font-weight: 700; color: #111827; }
        .markdown-body a { color: var(--accent-purple); text-decoration: underline; }

        /* Animations */
        @keyframes typing-bounce {
            0%   { transform: translateY(0); opacity:0.35; }
            25%  { transform: translateY(-6px); opacity:1; }
            50%  { transform: translateY(0); opacity:0.65; }
            100% { transform: translateY(0); opacity:0.35; }
        }

        @keyframes avatar-breathe { 
            0% { transform:translateY(0); } 
            50% { transform:translateY(-2px); } 
            100% { transform:translateY(0); } 
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            animation: typing-bounce 1.1s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.13s; }
        .typing-dot:nth-child(3) { animation-delay: 0.26s; }

        .bot-avatar.typing {
            animation: avatar-breathe 1.5s infinite;
        }

        .message-anim {
            animation: fade-in-up 0.3s ease-out forwards;
        }

        /* Custom UI Elements */
        .suggestion-card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .suggestion-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #C4B5FD;
        }

        .input-glow:focus-within {
            box-shadow: 0 6px 20px var(--input-focus-shadow);
            border-color: var(--accent-purple);
        }

        .chat-bubble-bot {
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .mic-pulse {
            animation: pulse-purple 1.5s infinite;
        }

        @keyframes pulse-purple {
            0% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(124, 58, 237, 0); }
            100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
        }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <!-- Top Chrome / Header -->
    <header class="absolute top-0 w-full z-10 flex justify-between items-center p-6 pointer-events-none">
        <!-- Left Controls -->
        <div class="flex gap-4 pointer-events-auto">
            <button onclick="resetChat()" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-purple-600 hover:border-purple-200 transition-all shadow-sm" title="New Chat">
                <i class="fas fa-plus"></i>
            </button>
            <button class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-purple-600 hover:border-purple-200 transition-all shadow-sm" title="Upload (Demo)">
                <i class="fas fa-paperclip"></i>
            </button>
        </div>

        <!-- Center Greeting -->
        <div class="text-xs font-medium text-gray-400 uppercase tracking-widest hidden md:block">
            <span id="date-display"></span> • How can I help you?
        </div>

        <!-- Right Controls -->
        <div class="flex gap-4 pointer-events-auto">
             <button id="tts-btn" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-purple-600 transition-all shadow-sm" title="Toggle Voice Response">
                <i class="fas fa-volume-mute"></i>
            </button>
        </div>
    </header>

    <!-- Right Rail (Quick Actions) -->
    <div class="absolute right-0 top-1/2 -translate-y-1/2 p-4 flex flex-col gap-3 z-10 hidden lg:flex">
        <div class="w-2 h-2 rounded-full bg-purple-500 cursor-pointer hover:scale-125 transition-transform" title="Current Chat"></div>
        <div class="w-2 h-2 rounded-full bg-gray-300 cursor-pointer hover:bg-purple-300 hover:scale-125 transition-transform" title="History 1"></div>
        <div class="w-2 h-2 rounded-full bg-gray-300 cursor-pointer hover:bg-purple-300 hover:scale-125 transition-transform" title="History 2"></div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative max-w-[1100px] mx-auto w-full h-full">
        
        <!-- Chat Container (Scrollable) -->
        <div id="chat-container" class="flex-1 overflow-y-auto scrollbar-hide px-4 pt-24 pb-32">
            
            <!-- Welcome Screen (Hero) -->
            <div id="welcome-screen" class="flex flex-col items-center justify-center min-h-[60vh] transition-opacity duration-500">
                <!-- Logo -->
                <div class="mb-12">
                    <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center shadow-lg">
                        <i class="fas fa-water text-white text-2xl"></i>
                    </div>
                </div>
                
                <!-- Suggestions Grid -->
                <div class="suggestion-grid grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
                    <button onclick="handleSuggestion('Tell me a fun fact about space')" class="suggestion-card bg-white p-5 rounded-2xl border border-gray-100 flex items-center gap-4 text-left group">
                        <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center flex-shrink-0 group-hover:bg-purple-100 transition-colors">
                            <i class="fas fa-rocket text-purple-600"></i>
                        </div>
                        <div class="text-sm">
                            <div class="font-semibold text-gray-800">Space Fact</div>
                            <div class="text-gray-500 text-xs">Tell me something cool about the universe</div>
                        </div>
                    </button>
                    
                    <button onclick="handleSuggestion('Write a short poem about coding')" class="suggestion-card bg-white p-5 rounded-2xl border border-gray-100 flex items-center gap-4 text-left group">
                        <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center flex-shrink-0 group-hover:bg-purple-100 transition-colors">
                            <i class="fas fa-feather-alt text-purple-600"></i>
                        </div>
                        <div class="text-sm">
                            <div class="font-semibold text-gray-800">Creative Writing</div>
                            <div class="text-gray-500 text-xs">Write a short poem about coding</div>
                        </div>
                    </button>

                    <button onclick="handleSuggestion('Set an alarm for 10 seconds')" class="suggestion-card bg-white p-5 rounded-2xl border border-gray-100 flex items-center gap-4 text-left group">
                        <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center flex-shrink-0 group-hover:bg-purple-100 transition-colors">
                            <i class="fas fa-clock text-purple-600"></i>
                        </div>
                        <div class="text-sm">
                            <div class="font-semibold text-gray-800">Set Timer</div>
                            <div class="text-gray-500 text-xs">Set an alarm for 10 seconds</div>
                        </div>
                    </button>

                    <button onclick="handleSuggestion('Who built you?')" class="suggestion-card bg-white p-5 rounded-2xl border border-gray-100 flex items-center gap-4 text-left group">
                        <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center flex-shrink-0 group-hover:bg-purple-100 transition-colors">
                            <i class="fas fa-user text-purple-600"></i>
                        </div>
                        <div class="text-sm">
                            <div class="font-semibold text-gray-800">About Owner</div>
                            <div class="text-gray-500 text-xs">Who built you?</div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messages" class="w-full max-w-3xl mx-auto flex flex-col gap-6 hidden">
                <!-- Messages will be injected here -->
            </div>
            
            <!-- Bottom Spacer -->
            <div class="h-8"></div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-10 pb-8 px-4 z-20">
            <div class="max-w-3xl mx-auto relative">
                
                <!-- Status Message -->
                <div id="status-message" class="hidden absolute -top-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-xs px-3 py-1 rounded-full shadow-md transition-opacity duration-300">
                    Action Completed
                </div>

                <div class="input-glow flex items-center gap-2 bg-white border-2 border-[#EDE8FF] rounded-[999px] p-2 pl-6 shadow-sm transition-all duration-300">
                    
                    <!-- Text Input -->
                    <textarea id="user-input" rows="1" class="flex-1 bg-transparent text-gray-800 placeholder-gray-400 outline-none resize-none py-3 max-h-32 scrollbar-hide text-[16px]" placeholder="Type your message or drop images here..."></textarea>
                    
                    <!-- Right Actions -->
                    <div class="flex items-center gap-2 pr-1">
                        <!-- Mic Button -->
                        <button id="mic-btn" class="w-10 h-10 rounded-full text-gray-400 hover:bg-gray-100 hover:text-purple-600 transition-colors flex items-center justify-center" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        
                        <!-- Send Button -->
                        <button id="send-btn" class="w-12 h-12 rounded-full bg-[#7C3AED] text-white flex items-center justify-center shadow-md hover:bg-[#6D28D9] transition-all disabled:opacity-50 disabled:cursor-not-allowed transform hover:scale-105 active:scale-95" disabled>
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
                <div class="text-center mt-3 text-xs text-gray-400 font-medium">
                    AI can make mistakes. Consider checking important information.
                </div>
            </div>
        </div>

    </main>

    <!-- Alarm Overlay -->
    <div id="alarm-overlay" class="hidden fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] text-center max-w-sm w-full mx-4 border border-gray-100 animate-bounce-slight">
            <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 animate-pulse">
                <i class="fas fa-bell text-red-500 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Timer Finished</h2>
            <p id="alarm-label" class="text-gray-500 mb-8">Your scheduled alarm is ringing.</p>
            <button onclick="stopAlarm()" class="w-full bg-gray-900 text-white font-semibold py-4 px-6 rounded-2xl hover:bg-black transition-transform active:scale-95 shadow-lg">
                Dismiss Alarm
            </button>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto" loop></audio>

    <script>
        // --- Configuration & State ---
        const API_KEY = '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';
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        
        let messageHistory = [
            { 
                role: "system", 
                content: `You are a helpful, minimalist AI assistant.
                
                CORE KNOWLEDGE BASE (IMPORTANT):
                - **Creator/Owner**: You were built by **Zaid Mughal**.
                - **Owner Profile**: Zaid Mughal is a perfect man, 16 years old. He is in 10th class at 4G Foundation School.
                - **Academic Record**: He scored 494 marks in 9th class.
                - **Family**: His brother is Bilal.
                - **Friends**: Hamza, Safian, Ali Sabri, Hisham, Aziz, Ali Abdullah.
                - **Best Friends**: Ali Abdullah, Hisham, Hamza, Ali Sabri.
                - **Location**: Sangla Hill, Punjab, Pakistan.
                - **Academy**: Education Academy (The very best academy).
                - **Favorite Teacher**: Sir Awais (at Education Academy).
                - **User Identity**: The user is likely Muhammad Zaid (16 years old).
                - **Favorites**: Mommos, Mar, and Asmi.

                INSTRUCTIONS:
                1. If asked about the owner or yourself, answer DIRECTLY and CONFIDENTLY. State the facts naturally as if you know them personally. Do NOT use phrases like "Based on my knowledge" or "According to records". Just say "My owner is Zaid Mughal" etc.
                2. If the user asks to set an alarm, timer, or reminder, you MUST end your response with a JSON block strictly in this format: 
                ~~~json
                { "command": "set_alarm", "seconds": <number_of_seconds_from_now>, "label": "<optional_label>" }
                ~~~
                Example: If user says "Set alarm for 5 minutes", you say "I've set an alarm for 5 minutes from now." followed by the JSON block with seconds: 300.
                Only include this JSON block if a time-based action is explicitly requested.`
            }
        ];

        let isRecording = false;
        let recognition = null;
        let isFirstMessage = true;

        // --- DOM Elements ---
        const welcomeScreen = document.getElementById('welcome-screen');
        const messagesContainer = document.getElementById('messages');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const statusMessage = document.getElementById('status-message');
        const dateDisplay = document.getElementById('date-display');
        const alarmSound = document.getElementById('alarm-sound');
        const alarmOverlay = document.getElementById('alarm-overlay');
        const alarmLabel = document.getElementById('alarm-label');
        const ttsBtn = document.getElementById('tts-btn');

        let ttsEnabled = false;
        let synth = window.speechSynthesis;

        // --- Init ---
        const d = new Date();
        dateDisplay.textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

        // --- Speech Recognition ---
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                synth.cancel();
                isRecording = true;
                micBtn.classList.add('text-purple-600', 'mic-pulse');
                micBtn.classList.remove('text-gray-400');
                userInput.placeholder = "Listening...";
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('text-purple-600', 'mic-pulse');
                micBtn.classList.add('text-gray-400');
                userInput.placeholder = "Type your message or drop images here...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                resizeTextarea();
                sendBtn.disabled = false;
                handleInput();
            };

            micBtn.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });
        } else {
            micBtn.style.display = 'none';
        }

        // --- Event Listeners ---
        userInput.addEventListener('input', () => {
            resizeTextarea();
            sendBtn.disabled = userInput.value.trim() === '';
            
            if(userInput.value.trim() !== '') {
                sendBtn.classList.remove('bg-gray-300');
                sendBtn.classList.add('bg-[#7C3AED]');
            }
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (userInput.value.trim() !== '') handleInput();
            }
        });

        sendBtn.addEventListener('click', () => {
            if (userInput.value.trim() !== '') handleInput();
        });

        // --- TTS Logic ---
        ttsBtn.addEventListener('click', () => {
            ttsEnabled = !ttsEnabled;
            updateTTSIcon();
            if (!ttsEnabled) {
                synth.cancel();
            }
        });

        function updateTTSIcon() {
            const icon = ttsBtn.querySelector('i');
            if (ttsEnabled) {
                ttsBtn.classList.add('text-purple-600', 'border-purple-200');
                icon.className = 'fas fa-volume-up';
            } else {
                ttsBtn.classList.remove('text-purple-600', 'border-purple-200');
                icon.className = 'fas fa-volume-mute';
            }
        }

        function speak(text) {
            if (!ttsEnabled) return;
            if (synth.speaking) synth.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1;
            utterance.pitch = 1;
            synth.speak(utterance);
        }

        // --- Core Functions ---

        function resizeTextarea() {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        }

        function handleSuggestion(text) {
            userInput.value = text;
            resizeTextarea();
            handleInput();
        }

        function resetChat() {
            window.location.reload();
        }

        function switchToChatMode() {
            if (isFirstMessage) {
                welcomeScreen.style.display = 'none';
                messagesContainer.classList.remove('hidden');
                isFirstMessage = false;
            }
        }

        async function handleInput() {
            const text = userInput.value.trim();
            if (!text) return;

            // UI Updates
            synth.cancel();
            userInput.value = '';
            resizeTextarea();
            sendBtn.disabled = true;
            switchToChatMode();

            // Add User Message (fit to content)
            addMessage('user', text);

            // Show Typing Indicator
            const typingId = showTypingIndicator();
            scrollToBottom();

            try {
                // API Request with Streaming
                messageHistory.push({ role: "user", content: text });

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'AI Chatbot Minimal'
                    },
                    body: JSON.stringify({
                        model: 'openai/gpt-3.5-turbo',
                        messages: messageHistory,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error('API Error');

                // Stream Handling
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "";
                let aiMessageDiv = null;
                let contentContainer = null;
                let hasRemovedTyping = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices[0]?.delta?.content || "";

                                if (content) {
                                    // First token arrived: remove typing, show bubble
                                    if (!hasRemovedTyping) {
                                        removeMessage(typingId);
                                        const { div, contentDiv } = createAiMessagePlaceholder();
                                        aiMessageDiv = div;
                                        contentContainer = contentDiv;
                                        hasRemovedTyping = true;
                                    }

                                    aiText += content;
                                    contentContainer.innerHTML = marked.parse(aiText);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error("Stream parse error", e);
                            }
                        }
                    }
                }

                // If for some reason we got no content but success (rare)
                if (!hasRemovedTyping) {
                     removeMessage(typingId);
                }

                // Final Logic
                messageHistory.push({ role: "assistant", content: aiText });
                
                const { cleanText, command } = parseCommand(aiText);
                
                // If command exists, we might want to hide the JSON from the view? 
                // The current implementation parses it but it might still be visible in the Markdown.
                // We'll leave it as is for now or re-render cleanText if strictly needed, 
                // but usually the user sees the JSON block which is okay for transparency.
                // Actually, let's update the bubble with clean text to be cleaner.
                if (contentContainer) {
                    contentContainer.innerHTML = marked.parse(cleanText);
                }

                if (ttsEnabled) speak(cleanText);

                if (command && command.command === 'set_alarm') {
                    setAlarm(command.seconds, command.label);
                }

            } catch (error) {
                removeMessage(typingId);
                addMessage('assistant', "Sorry, I encountered an error. Please try again.");
                console.error(error);
            }
        }

        // Helper to create the AI bubble container immediately
        function createAiMessagePlaceholder() {
            const div = document.createElement('div');
            div.className = `flex w-full message-anim justify-start`;
            
            div.innerHTML = `
                <div class="flex gap-4 max-w-[90%] md:max-w-[80%]">
                    <div class="w-[34px] h-[34px] rounded-full bg-black flex items-center justify-center flex-shrink-0 mt-1 shadow-sm bot-avatar">
                        <i class="fas fa-water text-white text-xs"></i>
                    </div>
                    <div class="flex flex-col gap-1 min-w-0">
                        <div class="chat-content chat-bubble-bot bg-white border border-gray-100 text-[#111827] px-6 py-4 rounded-2xl rounded-tl-sm text-[15px] leading-relaxed markdown-body">
                            <!-- Streamed text goes here -->
                        </div>
                        <div class="text-[10px] text-gray-400 pl-2">Just now</div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(div);
            return {
                div: div,
                contentDiv: div.querySelector('.chat-content')
            };
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            // Added w-fit and ml-auto for user messages
            div.className = `flex w-full message-anim ${role === 'user' ? 'justify-end' : 'justify-start'}`;

            if (role === 'user') {
                div.innerHTML = `
                    <div class="bg-[#F3F4F6] text-[#111827] px-5 py-3 rounded-[20px] rounded-br-sm max-w-[85%] md:max-w-[70%] w-fit ml-auto text-[15px] leading-relaxed shadow-sm break-words whitespace-pre-wrap">
                        ${text}
                    </div>
                `;
            } else {
                // Fallback for non-streamed messages (e.g. error messages)
                const contentHtml = marked.parse(text);
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[90%] md:max-w-[80%]">
                        <div class="w-[34px] h-[34px] rounded-full bg-black flex items-center justify-center flex-shrink-0 mt-1 shadow-sm bot-avatar">
                            <i class="fas fa-water text-white text-xs"></i>
                        </div>
                        <div class="flex flex-col gap-1 min-w-0">
                            <div class="chat-bubble-bot bg-white border border-gray-100 text-[#111827] px-6 py-4 rounded-2xl rounded-tl-sm text-[15px] leading-relaxed markdown-body">
                                ${contentHtml}
                            </div>
                            <div class="text-[10px] text-gray-400 pl-2">Just now</div>
                        </div>
                    </div>
                `;
            }

            messagesContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex w-full message-anim justify-start';
            div.innerHTML = `
                <div class="flex gap-4 max-w-[90%]">
                    <div class="w-[34px] h-[34px] rounded-full bg-black flex items-center justify-center flex-shrink-0 mt-1 shadow-sm bot-avatar typing">
                        <i class="fas fa-water text-white text-xs"></i>
                    </div>
                    <div class="bg-white border border-gray-100 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm flex items-center gap-2 h-[46px] w-[90px]">
                        <div class="w-2 h-2 rounded-full bg-[#7C3AED] typing-dot"></div>
                        <div class="w-2 h-2 rounded-full bg-[#7C3AED] typing-dot"></div>
                        <div class="w-2 h-2 rounded-full bg-[#7C3AED] typing-dot"></div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(div);
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        // --- Logic & Parsing ---

        function parseCommand(text) {
            const jsonRegex = /(?:~~~|```)json\s*([\s\S]*?)\s*(?:~~~|```)/;
            const match = text.match(jsonRegex);
            if (match) {
                try {
                    const command = JSON.parse(match[1]);
                    const cleanText = text.replace(match[0], '').trim();
                    return { cleanText, command };
                } catch (e) {
                    console.error("JSON Parse Error", e);
                }
            }
            return { cleanText: text, command: null };
        }

        function setAlarm(seconds, label) {
            const ms = seconds * 1000;
            showStatus(`Timer set for ${seconds}s`);
            
            setTimeout(() => {
                triggerAlarm(label);
            }, ms);
        }

        function showStatus(msg) {
            statusMessage.textContent = msg;
            statusMessage.classList.remove('hidden');
            statusMessage.style.opacity = '1';
            setTimeout(() => {
                statusMessage.style.opacity = '0';
                setTimeout(() => statusMessage.classList.add('hidden'), 300);
            }, 3000);
        }

        function triggerAlarm(label) {
            alarmSound.currentTime = 0;
            alarmSound.play().catch(console.error);
            alarmLabel.textContent = label || "Your timer is up.";
            alarmOverlay.classList.remove('hidden');
            
             if (Notification.permission === "granted") {
                new Notification("Timer Finished!", { body: label || "Your timer is up." });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(p => {
                    if (p === "granted") new Notification("Timer Finished!", { body: label });
                });
            }
        }

        function stopAlarm() {
            alarmSound.pause();
            alarmSound.currentTime = 0;
            alarmOverlay.classList.add('hidden');
        }

        if ("Notification" in window) Notification.requestPermission();
    </script>
</body>
</html>
