/* ═══════════════════════════════════════════════════════
   CHAT LIST
═══════════════════════════════════════════════════════ */
function loadChatList() {
  const uid = state.currentUser.uid;
  const ref = db.ref(`users/${uid}/chats`);

  // Cleanup previous listeners
  state.chatListListeners.forEach(off => off());
  state.chatListListeners = [];

  const handler = ref.on('value', async (snap) => {
    const chatList = document.getElementById('chat-list');
    const emptyState = document.getElementById('chats-empty');
    const data = snap.val();

    if (!data) {
      chatList.innerHTML = '';
      chatList.appendChild(emptyState);
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');

    const chats = Object.entries(data).sort(([,a],[,b]) => (b.lastTime||0) - (a.lastTime||0));

    // Clear and rebuild efficiently
    const existingItems = new Map();
    chatList.querySelectorAll('.chat-list-item[data-chatid]').forEach(el => {
      existingItems.set(el.dataset.chatid, el);
    });

    const fragment = document.createDocumentFragment();
    fragment.appendChild(emptyState);

    for (const [chatId, chatData] of chats) {
      const otherUid = chatData.otherUid;
      const existing = existingItems.get(chatId);

      if (existing) {
        updateChatListItem(existing, chatData);
        fragment.appendChild(existing);
      } else {
        const item = createChatListItem(chatId, otherUid, chatData);
        fragment.appendChild(item);
      }
    }

    chatList.innerHTML = '';
    chatList.appendChild(fragment);
  });

  state.chatListListeners.push(() => ref.off('value', handler));
}

function createChatListItem(chatId, otherUid, data) {
  const el = document.createElement('div');
  el.className = 'chat-list-item';
  el.dataset.chatid = chatId;
  el.dataset.otheruid = otherUid;
  el.onclick = () => openChat(otherUid, data.username || 'User');

  updateChatListItem(el, data);
  return el;
}

function updateChatListItem(el, data) {
  const lastMsg = data.lastMessage || '';
  const displayMsg = lastMsg.startsWith('[deleted]') ? 'This message was deleted' : lastMsg;

  el.innerHTML = `
    <div class="chat-item-avatar">${getInitial(data.username)}</div>
    <div class="chat-item-info">
      <div class="chat-item-name">${escapeHtml(data.username || 'User')}</div>
      <div class="chat-item-last">${escapeHtml(displayMsg)}</div>
    </div>
    <div class="chat-item-meta">
      <span class="chat-item-time">${data.lastTime ? formatTime(data.lastTime) : ''}</span>
      ${data.unread ? `<span class="unread-badge">${data.unread}</span>` : ''}
    </div>
  `;
  el.onclick = () => openChat(el.dataset.otheruid, data.username || 'User');
}

/* ═══════════════════════════════════════════════════════
   FRIEND REQUESTS
═══════════════════════════════════════════════════════ */
function listenForRequests() {
  const uid = state.currentUser.uid;
  const ref = db.ref(`requests/${uid}`);

  state.requestListeners.forEach(off => off());
  state.requestListeners = [];

  const handler = ref.on('value', (snap) => {
    const data = snap.val();
    const requestsList = document.getElementById('requests-list');
    const emptyState = document.getElementById('requests-empty');
    const badge = document.getElementById('requests-badge');
    const dot = document.getElementById('requests-dot');

    if (!data) {
      requestsList.innerHTML = '';
      requestsList.appendChild(emptyState);
      emptyState.classList.remove('hidden');
      badge.classList.remove('show');
      dot.classList.remove('show');
      return;
    }

    const pending = Object.entries(data).filter(([,v]) => v.status === 'pending');
    emptyState.classList.toggle('hidden', pending.length > 0 || Object.keys(data).length > 0);

    if (pending.length > 0) {
      badge.textContent = pending.length;
      badge.classList.add('show');
      dot.classList.add('show');
    } else {
      badge.classList.remove('show');
      dot.classList.remove('show');
    }

    requestsList.innerHTML = '';
    requestsList.appendChild(emptyState);

    if (Object.keys(data).length === 0) {
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');

    Object.entries(data).forEach(([fromUid, reqData]) => {
      if (reqData.status === 'pending') {
        const item = createRequestItem(fromUid, reqData);
        requestsList.appendChild(item);
      }
    });
  });

  state.requestListeners.push(() => ref.off('value', handler));
}

function createRequestItem(fromUid, reqData) {
  const el = document.createElement('div');
  el.className = 'request-item';
  el.innerHTML = `
    <div class="request-item-avatar">${getInitial(reqData.fromUsername)}</div>
    <div class="request-item-info">
      <div class="request-item-name">${escapeHtml(reqData.fromUsername)}</div>
      <div class="request-item-sub">Wants to connect</div>
    </div>
    <div class="request-actions">
      <button class="btn-accept">Accept</button>
      <button class="btn-reject">Decline</button>
    </div>
  `;

  el.querySelector('.btn-accept').onclick = () => acceptRequest(fromUid, reqData);
  el.querySelector('.btn-reject').onclick = () => rejectRequest(fromUid);
  return el;
}

async function acceptRequest(fromUid, reqData) {
  const uid = state.currentUser.uid;
  const chatId = getChatId(uid, fromUid);
  const now = firebase.database.ServerValue.TIMESTAMP;

  try {
    const updates = {};

    // Mark request as accepted
    updates[`requests/${uid}/${fromUid}/status`] = 'accepted';

    // Add to both users' chat lists
    updates[`users/${uid}/chats/${chatId}`] = {
      otherUid: fromUid,
      username: reqData.fromUsername,
      lastMessage: '',
      lastTime: now,
      unread: 0
    };
    updates[`users/${fromUid}/chats/${chatId}`] = {
      otherUid: uid,
      username: state.currentUsername,
      lastMessage: '',
      lastTime: now,
      unread: 0
    };

    await db.ref().update(updates);
    showToast(`${reqData.fromUsername} added to chats ✓`);
  } catch (err) {
    showToast('Error accepting request');
  }
}

async function rejectRequest(fromUid) {
  try {
    await db.ref(`requests/${state.currentUser.uid}/${fromUid}`).remove();
    showToast('Request declined');
  } catch (err) {
    showToast('Error declining request');
  }
}

/* ═══════════════════════════════════════════════════════
   ADD USER / SEARCH
═══════════════════════════════════════════════════════ */
function openAddUser() {
  document.getElementById('search-user-input').value = '';
  document.getElementById('search-result-container').innerHTML = '';
  showModal('add-user-modal');
}

async function searchUser() {
  const query = document.getElementById('search-user-input').value.trim();
  const container = document.getElementById('search-result-container');

  if (!query) {
    showToast('Enter a user ID to search');
    return;
  }

  if (query === state.currentUser.uid) {
    container.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px;">That's your own ID!</p>`;
    return;
  }

  container.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">Searching...</div>`;

  try {
    const snap = await db.ref(`users/${query}`).get();

    if (!snap.exists()) {
      container.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px;">No user found with this ID.</p>`;
      return;
    }

    const userData = snap.val();

    // Check if already friends
    const chatId = getChatId(state.currentUser.uid, query);
    const existingChat = await db.ref(`users/${state.currentUser.uid}/chats/${chatId}`).get();

    // Check if request already sent
    const existingReq = await db.ref(`requests/${query}/${state.currentUser.uid}`).get();

    let actionBtn = '';
    if (existingChat.exists()) {
      actionBtn = `<button class="btn-send-request" disabled>Already Friends</button>`;
    } else if (existingReq.exists()) {
      actionBtn = `<button class="btn-send-request" disabled>Request Sent</button>`;
    } else {
      actionBtn = `<button class="btn-send-request" onclick="sendFriendRequest('${query}', '${escapeHtml(userData.username)}')">Send Request</button>`;
    }

    container.innerHTML = `
      <div class="search-result-item">
        <div class="search-result-avatar">${getInitial(userData.username)}</div>
        <div class="search-result-info">
          <div class="search-result-name">${escapeHtml(userData.username)}</div>
          <div class="search-result-id">${query.substring(0, 16)}...</div>
        </div>
        ${actionBtn}
      </div>
    `;
  } catch (err) {
    container.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:12px;">Search failed. Try again.</p>`;
  }
}

async function sendFriendRequest(toUid, toUsername) {
  try {
    await db.ref(`requests/${toUid}/${state.currentUser.uid}`).set({
      fromUid: state.currentUser.uid,
      fromUsername: state.currentUsername,
      status: 'pending',
      timestamp: firebase.database.ServerValue.TIMESTAMP
    });

    showToast('Request sent!');
    closeModal('add-user-modal');
  } catch (err) {
    showToast('Failed to send request');
  }
}

/* ═══════════════════════════════════════════════════════
   OPEN / CLOSE CHAT
═══════════════════════════════════════════════════════ */
function openChat(otherUid, otherUsername) {
  state.currentChat = getChatId(state.currentUser.uid, otherUid);
  state.currentChatUser = { uid: otherUid, username: otherUsername };
  state.replyTarget = null;
  state.isSelectMode = false;
  state.selectedMessages.clear();

  document.getElementById('chat-header-name').textContent = otherUsername;
  document.getElementById('chat-header-status').textContent = '';
  document.getElementById('messages-inner').innerHTML = '';
  document.getElementById('select-header').classList.remove('show');
  document.getElementById('chat-header-bar').style.display = '';
  document.getElementById('reply-indicator').classList.remove('show');
  document.getElementById('message-input').value = '';
  document.getElementById('emoji-picker').classList.remove('show');

  showScreen('chat-screen');
  cleanupListeners();
  listenForMessages();
  listenForTyping();
  markMessagesRead();
}

function closeChat() {
  cleanupListeners();
  clearTypingIndicator();
  state.currentChat = null;
  state.currentChatUser = null;
  state.replyTarget = null;
  state.isSelectMode = false;
  state.selectedMessages.clear();
  showScreen('main-screen');
}

/* ═══════════════════════════════════════════════════════
   MESSAGE RENDERING
═══════════════════════════════════════════════════════ */
const renderedMessages = new Map();
let lastDateLabel = null;

function listenForMessages() {
  if (!state.currentChat) return;
  const ref = db.ref(`chats/${state.currentChat}/messages`);
  renderedMessages.clear();
  lastDateLabel = null;

  const handler = ref.on('child_added', (snap) => {
    const msg = { id: snap.key, ...snap.val() };
    if (!renderedMessages.has(msg.id)) {
      renderedMessages.set(msg.id, msg);
      appendMessage(msg);
      scrollToBottom();
    }
  });

  const changeHandler = ref.on('child_changed', (snap) => {
    const msg = { id: snap.key, ...snap.val() };
    renderedMessages.set(msg.id, msg);
    updateMessageInDOM(msg);
  });

  const removeHandler = ref.on('child_removed', (snap) => {
    renderedMessages.delete(snap.key);
    removeMessageFromDOM(snap.key);
  });

  state.messageListeners.push(
    () => ref.off('child_added', handler),
    () => ref.off('child_changed', changeHandler),
    () => ref.off('child_removed', removeHandler)
  );
}

function appendMessage(msg) {
  const inner = document.getElementById('messages-inner');
  const isSent = msg.senderUid === state.currentUser.uid;

  // Date divider
  const dateLabel = formatDate(msg.timestamp);
  if (dateLabel !== lastDateLabel) {
    lastDateLabel = dateLabel;
    const divider = document.createElement('div');
    divider.className = 'date-divider';
    divider.innerHTML = `<span>${dateLabel}</span>`;
    inner.appendChild(divider);
  }

  // Consecutive check
  const prevWrapper = inner.querySelector('.message-wrapper:last-of-type');
  const isConsecutive = prevWrapper &&
    prevWrapper.dataset.sender === msg.senderUid &&
    !prevWrapper.querySelector('.date-divider');

  const wrapper = buildMessageElement(msg, isSent, isConsecutive);
  inner.appendChild(wrapper);
  state.messageRefs.set(msg.id, wrapper);

  // Mark delivered if received
  if (!isSent && msg.status !== 'seen' && msg.status !== 'delivered') {
    db.ref(`chats/${state.currentChat}/messages/${msg.id}/status`).set('delivered');
  }
}

function buildMessageElement(msg, isSent, isConsecutive = false) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
  wrapper.dataset.id = msg.id;
  wrapper.dataset.sender = msg.senderUid;
  wrapper.dataset.text = msg.text || '';

  if (!isConsecutive) {
    const spacer = document.createElement('div');
    spacer.className = 'message-group-spacer';
    wrapper.appendChild(spacer);
  }

  const bubble = document.createElement('div');
  bubble.className = `message-bubble${isConsecutive ? ' consecutive' : ''}`;

  // Reply preview
  if (msg.replyTo) {
    const replyDiv = document.createElement('div');
    replyDiv.className = 'reply-preview-bubble';
    replyDiv.innerHTML = `
      <div class="reply-sender">${escapeHtml(msg.replyTo.senderName)}</div>
      <div class="reply-text">${escapeHtml(msg.replyTo.text)}</div>
    `;
    bubble.appendChild(replyDiv);
  }

  // Message text node
  const textNode = document.createElement('span');
  textNode.className = 'msg-text';

  if (msg.deleted) {
    textNode.textContent = 'This message was deleted';
    textNode.classList.add('message-deleted');
  } else {
    textNode.textContent = msg.text || '';
  }
  bubble.appendChild(textNode);

  // Attach long press & swipe
  attachMessageGestures(wrapper, bubble, msg, isSent);

  wrapper.appendChild(bubble);

  // Edited label
  if (msg.edited && !msg.deleted) {
    const editedLabel = document.createElement('div');
    editedLabel.className = 'message-edited-label';
    editedLabel.textContent = 'edited';
    editedLabel.style.color = isSent ? 'rgba(255,255,255,0.6)' : 'var(--text-muted)';
    wrapper.appendChild(editedLabel);
  }

  // Meta (time + status)
  const meta = document.createElement('div');
  meta.className = 'message-meta';
  meta.innerHTML = `<span class="message-time">${formatTime(msg.timestamp)}</span>`;

  if (isSent) {
    const statusEl = document.createElement('span');
    statusEl.className = `message-status${msg.status === 'seen' ? ' seen' : ''}`;
    statusEl.textContent = msg.status === 'seen' ? '✓✓' : msg.status === 'delivered' ? '✓✓' : '✓';
    meta.appendChild(statusEl);
  }
  wrapper.appendChild(meta);

  // Reactions
  if (msg.reactions && Object.keys(msg.reactions).length > 0) {
    const reactionsEl = buildReactionsElement(msg.reactions);
    wrapper.appendChild(reactionsEl);
  }

  return wrapper;
}

function buildReactionsElement(reactions) {
  const container = document.createElement('div');
  container.className = 'message-reactions';

  // Group reactions
  const groups = {};
  Object.values(reactions).forEach(emoji => {
    groups[emoji] = (groups[emoji] || 0) + 1;
  });

  Object.entries(groups).forEach(([emoji, count]) => {
    const chip = document.createElement('div');
    chip.className = 'reaction-chip';
    chip.innerHTML = `${emoji}<span class="reaction-count">${count > 1 ? count : ''}</span>`;
    container.appendChild(chip);
  });

  return container;
}

function updateMessageInDOM(msg) {
  const wrapper = state.messageRefs.get(msg.id) ||
    document.querySelector(`.message-wrapper[data-id="${msg.id}"]`);
  if (!wrapper) return;

  const isSent = msg.senderUid === state.currentUser.uid;

  // Update text
  const textNode = wrapper.querySelector('.msg-text');
  if (textNode) {
    if (msg.deleted) {
      textNode.textContent = 'This message was deleted';
      textNode.classList.add('message-deleted');
    } else {
      textNode.textContent = msg.text || '';
      textNode.classList.remove('message-deleted');
    }
  }

  // Update status
  const statusEl = wrapper.querySelector('.message-status');
  if (statusEl && isSent) {
    statusEl.textContent = msg.status === 'seen' ? '✓✓' : msg.status === 'delivered' ? '✓✓' : '✓';
    statusEl.classList.toggle('seen', msg.status === 'seen');
  }

  // Update edited label
  let editedLabel = wrapper.querySelector('.message-edited-label');
  if (msg.edited && !msg.deleted) {
    if (!editedLabel) {
      editedLabel = document.createElement('div');
      editedLabel.className = 'message-edited-label';
      editedLabel.style.color = isSent ? 'rgba(255,255,255,0.6)' : 'var(--text-muted)';
      const metaEl = wrapper.querySelector('.message-meta');
      if (metaEl) wrapper.insertBefore(editedLabel, metaEl);
    }
    editedLabel.textContent = 'edited';
  } else if (editedLabel) {
    editedLabel.remove();
  }

  // Update reactions
  let existingReactions = wrapper.querySelector('.message-reactions');
  if (existingReactions) existingReactions.remove();
  if (msg.reactions && Object.keys(msg.reactions).length > 0) {
    wrapper.appendChild(buildReactionsElement(msg.reactions));
  }

  // Update wrapper dataset
  wrapper.dataset.text = msg.text || '';
}

function removeMessageFromDOM(msgId) {
  const wrapper = state.messageRefs.get(msgId) ||
    document.querySelector(`.message-wrapper[data-id="${msgId}"]`);
  if (wrapper) {
    wrapper.remove();
    state.messageRefs.delete(msgId);
  }
}

function scrollToBottom(smooth = true) {
  const container = document.getElementById('messages-container');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function markMessagesRead() {
  if (!state.currentChat || !state.currentChatUser) return;
  const ref = db.ref(`chats/${state.currentChat}/messages`);

  ref.orderByChild('senderUid').equalTo(state.currentChatUser.uid).once('value', (snap) => {
    const updates = {};
    snap.forEach(child => {
      const msg = child.val();
      if (msg.status !== 'seen') {
        updates[`chats/${state.currentChat}/messages/${child.key}/status`] = 'seen';
      }
    });
    if (Object.keys(updates).length > 0) {
      db.ref().update(updates);
    }
  });

  // Reset unread
  db.ref(`users/${state.currentUser.uid}/chats/${state.currentChat}/unread`).set(0);
}

/* ═══════════════════════════════════════════════════════
   SENDING MESSAGES
═══════════════════════════════════════════════════════ */
function setupInputHandlers() {
  const input = document.getElementById('message-input');
  if (!input._initialized) {
    input._initialized = true;

    input.addEventListener('input', () => {
      autoResizeInput(input);
      handleTyping();
      closeEmojiPicker();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Mobile keyboard handling
    input.addEventListener('focus', () => {
      setTimeout(scrollToBottom, 300);
      document.body.classList.add('keyboard-open');
    });

    input.addEventListener('blur', () => {
      document.body.classList.remove('keyboard-open');
    });
  }
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendMessage() {
  if (state.isSending) return;

  const input = document.getElementById('message-input');
  const text = input.value.trim();

  if (!text || !state.currentChat) return;

  state.isSending = true;

  // Clear input immediately for responsiveness
  input.value = '';
  input.style.height = '';
  closeEmojiPicker();

  const msgData = {
    text: text,
    senderUid: state.currentUser.uid,
    senderName: state.currentUsername,
    timestamp: firebase.database.ServerValue.TIMESTAMP,
    status: 'sent',
    deleted: false,
    edited: false,
  };

  if (state.replyTarget) {
    msgData.replyTo = {
      msgId: state.replyTarget.id,
      text: state.replyTarget.text.substring(0, 100),
      senderName: state.replyTarget.senderName
    };
    cancelReply();
  }

  const msgRef = db.ref(`chats/${state.currentChat}/messages`).push();
  const msgId = msgRef.key;

  // Optimistic update handled by child_added listener
  msgRef.set(msgData)
    .then(() => {
      // Update chat list for both users
      const otherUid = state.currentChatUser.uid;
      const updates = {};
      const preview = text.length > 40 ? text.substring(0, 40) + '…' : text;
      const ts = firebase.database.ServerValue.TIMESTAMP;

      updates[`users/${state.currentUser.uid}/chats/${state.currentChat}/lastMessage`] = preview;
      updates[`users/${state.currentUser.uid}/chats/${state.currentChat}/lastTime`] = ts;
      updates[`users/${otherUid}/chats/${state.currentChat}/lastMessage`] = preview;
      updates[`users/${otherUid}/chats/${state.currentChat}/lastTime`] = ts;

      // Increment unread for other user
      db.ref(`users/${otherUid}/chats/${state.currentChat}/unread`).transaction(n => (n || 0) + 1);

      return db.ref().update(updates);
    })
    .catch(() => showToast('Failed to send message'))
    .finally(() => {
      state.isSending = false;
      stopTyping();
    });
}

/* ═══════════════════════════════════════════════════════
   TYPING INDICATOR
═══════════════════════════════════════════════════════ */
function handleTyping() {
  if (!state.currentChat || !state.currentChatUser) return;

  if (!state.isTyping) {
    state.isTyping = true;
    db.ref(`chats/${state.currentChat}/typing/${state.currentUser.uid}`).set(true);
  }

  clearTimeout(state.typingTimeout);
  state.typingTimeout = setTimeout(stopTyping, 2500);
}

function stopTyping() {
  if (!state.currentChat) return;
  state.isTyping = false;
  db.ref(`chats/${state.currentChat}/typing/${state.currentUser.uid}`).set(false);
}

function listenForTyping() {
  if (!state.currentChat || !state.currentChatUser) return;
  const ref = db.ref(`chats/${state.currentChat}/typing/${state.currentChatUser.uid}`);
  let typingEl = null;

  const handler = ref.on('value', (snap) => {
    const isTyping = snap.val() === true;
    const statusEl = document.getElementById('chat-header-status');

    if (isTyping) {
      statusEl.textContent = 'typing…';
      statusEl.classList.add('typing');
    } else {
      statusEl.textContent = '';
      statusEl.classList.remove('typing');
    }
  });

  state.typingListener = () => ref.off('value', handler);
}

function clearTypingIndicator() {
  if (state.currentChat) {
    db.ref(`chats/${state.currentChat}/typing/${state.currentUser.uid}`).set(false);
  }
  clearTimeout(state.typingTimeout);
  state.isTyping = false;
}

/* ═══════════════════════════════════════════════════════
   GESTURE SYSTEM
═══════════════════════════════════════════════════════ */
function attachMessageGestures(wrapper, bubble, msg, isSent) {
  let pressTimer = null;
  let touchStartX = 0;
  let touchStartY = 0;
  let swipeStarted = false;
  let swipeDist = 0;

  // Long press
  const startLongPress = () => {
    pressTimer = setTimeout(() => {
      if (!state.isSelectMode) {
        navigator.vibrate && navigator.vibrate(30);
        openMessageSheet(msg, isSent, wrapper);
      } else {
        toggleSelectMessage(wrapper, msg.id);
      }
    }, 500);
  };

  const cancelLongPress = () => {
    clearTimeout(pressTimer);
  };

  // Touch events for long press + swipe
  bubble.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    swipeStarted = false;
    swipeDist = 0;

    if (state.isSelectMode) {
      startLongPress();
    } else {
      startLongPress();
    }
  }, { passive: true });

  bubble.addEventListener('touchmove', (e) => {
    if (!pressTimer) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;

    // Cancel long press if moved too much
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      cancelLongPress();
    }

    // Swipe right to reply (only on received or sent)
    if (Math.abs(dx) > Math.abs(dy) && dx > 0 && !swipeStarted && !msg.deleted) {
      swipeStarted = true;
    }

    if (swipeStarted) {
      swipeDist = Math.min(dx, 80);
      bubble.style.transform = `translateX(${swipeDist}px)`;
      bubble.style.transition = 'none';
    }
  }, { passive: true });

  bubble.addEventListener('touchend', () => {
    cancelLongPress();

    if (swipeStarted && swipeDist > 50) {
      // Trigger reply
      bubble.style.transform = 'translateX(0)';
      bubble.style.transition = 'transform var(--transition-spring)';
      initiateReply(msg);
    } else {
      bubble.style.transform = '';
      bubble.style.transition = '';
    }

    if (state.isSelectMode) {
      toggleSelectMessage(wrapper, msg.id);
    }
  }, { passive: true });

  // Mouse long press (desktop)
  let mouseTimer;
  bubble.addEventListener('mousedown', () => {
    mouseTimer = setTimeout(() => {
      openMessageSheet(msg, isSent, wrapper);
    }, 600);
  });

  bubble.addEventListener('mouseup', () => clearTimeout(mouseTimer));
  bubble.addEventListener('mouseleave', () => clearTimeout(mouseTimer));
}

/* ═══════════════════════════════════════════════════════
   SELECT MODE
═══════════════════════════════════════════════════════ */
function enterSelectMode(wrapper, msgId) {
  state.isSelectMode = true;
  state.selectedMessages.clear();
  document.getElementById('select-header').classList.add('show');
  document.getElementById('chat-header-bar').style.display = 'none';
  toggleSelectMessage(wrapper, msgId);
}

function exitSelectMode() {
  state.isSelectMode = false;
  state.selectedMessages.clear();
  document.getElementById('select-header').classList.remove('show');
  document.getElementById('chat-header-bar').style.display = '';
  document.querySelectorAll('.message-wrapper.selected').forEach(el => el.classList.remove('selected'));
  updateSelectCount();
}

function toggleSelectMessage(wrapper, msgId) {
  if (state.selectedMessages.has(msgId)) {
    state.selectedMessages.delete(msgId);
    wrapper.classList.remove('selected');
  } else {
    state.selectedMessages.add(msgId);
    wrapper.classList.add('selected');
  }
  updateSelectCount();
}

function updateSelectCount() {
  document.getElementById('select-count').textContent = `${state.selectedMessages.size} selected`;
}

async function bulkDelete() {
  if (state.selectedMessages.size === 0) return;
  const uid = state.currentUser.uid;
  const updates = {};

  state.selectedMessages.forEach(msgId => {
    const wrapper = document.querySelector(`.message-wrapper[data-id="${msgId}"]`);
    const isSent = wrapper?.dataset.sender === uid;

    // Delete for me only
    updates[`chats/${state.currentChat}/messages/${msgId}/deletedFor/${uid}`] = true;
  });

  try {
    await db.ref().update(updates);
    showToast('Messages deleted');
  } catch {
    showToast('Failed to delete');
  }

  exitSelectMode();
}

/* ═══════════════════════════════════════════════════════
   REPLY SYSTEM
═══════════════════════════════════════════════════════ */
function initiateReply(msg) {
  if (msg.deleted) return;
  state.replyTarget = {
    id: msg.id,
    text: msg.text,
    senderName: msg.senderName || (msg.senderUid === state.currentUser.uid ? state.currentUsername : state.currentChatUser.username)
  };

  document.getElementById('reply-indicator-sender').textContent = state.replyTarget.senderName;
  document.getElementById('reply-indicator-text').textContent = state.replyTarget.text;
  document.getElementById('reply-indicator').classList.add('show');
  document.getElementById('message-input').focus();
}

function cancelReply() {
  state.replyTarget = null;
  document.getElementById('reply-indicator').classList.remove('show');
}

/* ═══════════════════════════════════════════════════════
   MESSAGE BOTTOM SHEET
═══════════════════════════════════════════════════════ */
function openMessageSheet(msg, isSent, wrapper) {
  state.currentSheetMsg = { msg, isSent, wrapper };
  closeEmojiPicker();

  // Reaction row
  const reactionRow = document.getElementById('reaction-picker-row');
  reactionRow.innerHTML = '';
  REACTION_EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'reaction-emoji-btn';
    btn.textContent = emoji;
    btn.onclick = () => {
      addReaction(msg.id, emoji);
      closeBottomSheet();
    };
    reactionRow.appendChild(btn);
  });

  // Actions
  const actionsEl = document.getElementById('sheet-actions');
  actionsEl.innerHTML = '';

  // Reply
  if (!msg.deleted) {
    addSheetAction(actionsEl, 'Reply', replyIcon(), () => {
      initiateReply(msg);
      closeBottomSheet();
    });
  }

  // Edit (only own messages, not deleted)
  if (isSent && !msg.deleted) {
    addSheetAction(actionsEl, 'Edit Message', editIcon(), () => {
      closeBottomSheet();
      startEditMessage(msg, wrapper);
    });
  }

  // Select
  addSheetAction(actionsEl, 'Select', selectIcon(), () => {
    closeBottomSheet();
    enterSelectMode(wrapper, msg.id);
  });

  if (!msg.deleted) {
    actionsEl.appendChild(createSheetDivider());

    // Delete for me
    addSheetAction(actionsEl, 'Delete for Me', trashIcon(), () => {
      closeBottomSheet();
      deleteForMe(msg.id);
    }, true);

    // Delete for everyone (own messages only, within 10 min)
    if (isSent) {
      const ageMs = Date.now() - (msg.timestamp || 0);
      if (ageMs < 10 * 60 * 1000) {
        addSheetAction(actionsEl, 'Delete for Everyone', trashIcon(), () => {
          closeBottomSheet();
          deleteForEveryone(msg.id);
        }, true);
      }
    }
  }

  // Show sheet
  document.getElementById('sheet-overlay').classList.add('show');
  const sheet = document.getElementById('message-sheet');
  sheet.classList.add('show');
}

function addSheetAction(container, label, iconHtml, onClick, isDanger = false) {
  const btn = document.createElement('button');
  btn.className = `sheet-action${isDanger ? ' danger' : ''}`;
  btn.innerHTML = `
    <div class="sheet-action-icon">${iconHtml}</div>
    <span class="sheet-action-label">${label}</span>
  `;
  btn.onclick = onClick;
  container.appendChild(btn);
}

function createSheetDivider() {
  const d = document.createElement('div');
  d.className = 'sheet-divider';
  return d;
}

function closeBottomSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('message-sheet').classList.remove('show');
  state.currentSheetMsg = null;
}

/* ═══════════════════════════════════════════════════════
   MESSAGE ACTIONS
═══════════════════════════════════════════════════════ */
function startEditMessage(msg, wrapper) {
  const bubble = wrapper.querySelector('.message-bubble');
  const textNode = bubble.querySelector('.msg-text');
  if (!textNode) return;

  const originalText = msg.text;

  // Replace text with input
  const editInput = document.createElement('textarea');
  editInput.className = 'message-edit-input';
  editInput.value = originalText;
  editInput.rows = 1;
  textNode.replaceWith(editInput);

  // Auto-size
  setTimeout(() => {
    editInput.style.height = 'auto';
    editInput.style.height = editInput.scrollHeight + 'px';
    editInput.focus();
    editInput.setSelectionRange(editInput.value.length, editInput.value.length);
  }, 50);

  editInput.addEventListener('input', () => {
    editInput.style.height = 'auto';
    editInput.style.height = editInput.scrollHeight + 'px';
  });

  // Action buttons
  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'message-edit-actions';
  actionsDiv.innerHTML = `
    <button class="edit-cancel-btn">Cancel</button>
    <button class="edit-save-btn">Save</button>
  `;
  bubble.appendChild(actionsDiv);

  actionsDiv.querySelector('.edit-cancel-btn').onclick = () => {
    editInput.replaceWith(textNode);
    actionsDiv.remove();
  };

  actionsDiv.querySelector('.edit-save-btn').onclick = async () => {
    const newText = editInput.value.trim();
    if (!newText || newText === originalText) {
      editInput.replaceWith(textNode);
      actionsDiv.remove();
      return;
    }

    try {
      await db.ref(`chats/${state.currentChat}/messages/${msg.id}`).update({
        text: newText,
        edited: true,
        editedAt: firebase.database.ServerValue.TIMESTAMP
      });
      actionsDiv.remove();
    } catch {
      showToast('Failed to edit message');
      editInput.replaceWith(textNode);
      actionsDiv.remove();
    }
  };
}

async function deleteForMe(msgId) {
  try {
    // Remove from local DOM
    removeMessageFromDOM(msgId);
    // Mark deleted for this user in Firebase
    await db.ref(`chats/${state.currentChat}/messages/${msgId}/deletedFor/${state.currentUser.uid}`).set(true);
    showToast('Message deleted');
  } catch {
    showToast('Failed to delete');
  }
}

async function deleteForEveryone(msgId) {
  try {
    await db.ref(`chats/${state.currentChat}/messages/${msgId}`).update({
      deleted: true,
      text: '',
      deletedAt: firebase.database.ServerValue.TIMESTAMP
    });
    showToast('Message deleted for everyone');
  } catch {
    showToast('Failed to delete');
  }
}

async function addReaction(msgId, emoji) {
  const uid = state.currentUser.uid;
  try {
    await db.ref(`chats/${state.currentChat}/messages/${msgId}/reactions/${uid}`).set(emoji);
  } catch {
    showToast('Failed to add reaction');
  }
}

/* ═══════════════════════════════════════════════════════
   EMOJI PICKER
═══════════════════════════════════════════════════════ */
function setupEmojiPicker() {
  const grid = document.getElementById('emoji-grid');
  if (grid.children.length > 0) return;

  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn-item';
    btn.textContent = emoji;
    btn.onclick = () => {
      const input = document.getElementById('message-input');
      const pos = input.selectionStart;
      const val = input.value;
      input.value = val.slice(0, pos) + emoji + val.slice(pos);
      input.focus();
      const newPos = pos + emoji.length;
      input.setSelectionRange(newPos, newPos);
      autoResizeInput(input);
      closeEmojiPicker();
    };
    grid.appendChild(btn);
  });
}

function toggleEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.classList.toggle('show');
  if (picker.classList.contains('show')) {
    document.getElementById('message-input').blur();
  }
}

function closeEmojiPicker() {
  document.getElementById('emoji-picker')?.classList.remove('show');
}

/* ═══════════════════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════════════════ */
function openSettings() {
  document.getElementById('uid-display').textContent = state.currentUser.uid;
  document.getElementById('new-username').value = '';
  document.getElementById('current-password').value = '';
  document.getElementById('new-password').value = '';
  showModal('settings-modal');
}

function copyUID() {
  const uid = state.currentUser.uid;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(uid).then(() => showToast('User ID copied!'));
  } else {
    showToast('UID: ' + uid);
  }
}

async function changeUsername() {
  const newUsername = document.getElementById('new-username').value.trim();

  if (newUsername.length < 8) {
    showToast('Username must be at least 8 chars');
    return;
  }

  try {
    const snap = await db.ref(`usernames/${newUsername.toLowerCase()}`).get();
    if (snap.exists() && snap.val() !== state.currentUser.uid) {
      showToast('Username already taken');
      return;
    }

    const oldUsername = state.currentUsername;
    const updates = {};
    updates[`users/${state.currentUser.uid}/username`] = newUsername;
    updates[`users/${state.currentUser.uid}/usernameLower`] = newUsername.toLowerCase();
    updates[`usernames/${newUsername.toLowerCase()}`] = state.currentUser.uid;
    updates[`usernames/${oldUsername.toLowerCase()}`] = null;

    await db.ref().update(updates);
    state.currentUsername = newUsername;
    document.getElementById('header-username-btn').textContent = newUsername;
    showToast('Username updated!');
    closeModal('settings-modal');
  } catch {
    showToast('Failed to update username');
  }
}

async function changePassword() {
  const currentPass = document.getElementById('current-password').value;
  const newPass = document.getElementById('new-password').value;

  if (newPass.length < 8) {
    showToast('New password must be at least 8 chars');
    return;
  }

  try {
    const email = state.currentUser.email;
    const cred = firebase.auth.EmailAuthProvider.credential(email, currentPass);
    await state.currentUser.reauthenticateWithCredential(cred);
    await state.currentUser.updatePassword(newPass);
    showToast('Password updated!');
    closeModal('settings-modal');
  } catch (err) {
    showToast(err.code === 'auth/wrong-password' ? 'Current password incorrect' : 'Failed to update password');
  }
}

/* ═══════════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════════ */
function showModal(id) {
  document.getElementById('modal-overlay').classList.add('show');
  document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function closeModal(id) {
  document.getElementById('modal-overlay').classList.remove('show');
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    closeModal();
  }
}

/* ═══════════════════════════════════════════════════════
   ESCAPE HTML
═══════════════════════════════════════════════════════ */
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ═══════════════════════════════════════════════════════
   VISUAL VIEWPORT HANDLING (Mobile keyboard)
═══════════════════════════════════════════════════════ */
if (window.visualViewport) {
  let pendingUpdate = false;

  window.visualViewport.addEventListener('resize', () => {
    if (pendingUpdate) return;
    pendingUpdate = true;
    requestAnimationFrame(() => {
      pendingUpdate = false;
      const vh = window.visualViewport.height;
      document.body.style.height = vh + 'px';
      scrollToBottom(false);
    });
  });

  window.visualViewport.addEventListener('scroll', () => {
    if (pendingUpdate) return;
    pendingUpdate = true;
    requestAnimationFrame(() => {
      pendingUpdate = false;
    });
  });
}

/* ═══════════════════════════════════════════════════════
   CLOSE EMOJI ON OUTSIDE CLICK
═══════════════════════════════════════════════════════ */
document.addEventListener('click', (e) => {
  const picker = document.getElementById('emoji-picker');
  if (picker && picker.classList.contains('show')) {
    const inputBar = document.getElementById('chat-input-bar');
    if (!inputBar.contains(e.target)) {
      closeEmojiPicker();
    }
  }
});

/* ═══════════════════════════════════════════════════════
   SETUP INPUT HANDLERS ON CHAT OPEN
═══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  setupInputHandlers();
  setupEmojiPicker();
});

/* ═══════════════════════════════════════════════════════
   SEARCH ENTER KEY
═══════════════════════════════════════════════════════ */
document.getElementById('search-user-input')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchUser();
});

/* ═══════════════════════════════════════════════════════
   PREVENT BOUNCE SCROLL ON iOS
═══════════════════════════════════════════════════════ */
document.addEventListener('touchmove', (e) => {
  if (e.target.closest('.messages-container') ||
      e.target.closest('.chat-list') ||
      e.target.closest('.requests-list') ||
      e.target.closest('.modal') ||
      e.target.closest('.bottom-sheet') ||
      e.target.closest('#message-input')) {
    return;
  }
  e.preventDefault();
}, { passive: false });
